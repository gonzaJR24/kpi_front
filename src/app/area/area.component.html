<app-home></app-home>
<div class="container">
    <h2 class="text-center mt-3">Informacion Areas</h2>

    <button class="btn btn-success mb-3" (click)="addAreaAlert($event)">Agregar Area</button>

    <table class="table table-hover table-bordered">
        <thead>
          <tr>
            <th scope="col">Id</th> 
            <th scope="col">Area</th>
            <th scope="col">Cantidad Empleados</th>
            <th scope="col">Puntaje Total</th>
            <th scope="col">Rendimiento Area</th>
            <th scope="col">Sucursal</th>
            <th scope="col" class="text-center">Funciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of areaResponse">
            <th scope="row">{{item.id}}</th>
            <td>{{item.nombreArea}}</td>
            <td>{{item.cantidadEmpleados}}</td>
            <td>{{item.puntajeTotal}}</td>
            <td>{{item.rendimientoArea}}</td>
            <td>{{item.sucursal.nombreSucursal|json}}</td>
            <td class="d-flex justify-content-center">
                <button class="btn btn-warning mx-3" (click)="EditAreaAlert($event)">Editar</button>
                <button class="btn btn-danger">Eliminar</button>
            </td>
          </tr>
        </tbody>
      </table>
</div>
