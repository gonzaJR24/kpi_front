<app-home></app-home>
<div class="container">
    <h2 class="text-center mt-3">Informacion Criterios</h2>

    <button class="btn btn-success mb-3" (click)="addCriterioAlert($event)">Agregar Criterio</button>

    <table class="table table-hover table-bordered border">
        <thead>
          <tr>
            <th scope="col">Id</th> 
            <th scope="col">Nombre Criterio</th>
            <th scope="col">Valor</th>
            <th scope="col">Area</th>
            <th scope="col" class="text-center">Funciones</th>

          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of criterios">
            <th scope="row">{{item.id}}</th>
            <td>{{item.nombreCriterio}}</td>
            <td>{{item.valor}}</td>
            <td>{{item.area.nombreArea| json}}</td>
            <td class="d-flex justify-content-center">
                <button class="btn mx-3" (click)="EditCriterioAlert($event, item)"><i class="fa-solid fa-pen-to-square"></i></button>
                <button class="btn" (click)="showDeleteAlert($event, item.id)"><i class="fa-solid fa-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
</div>
